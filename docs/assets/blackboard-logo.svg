<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="bb-title bb-desc">
  <title id="bb-title">Blackboard hero logo</title>
  <desc id="bb-desc">Refined chalkboard-inspired hero image for the Blackboard local-first agentic coding workspace.</desc>
  <defs>
    <linearGradient id="bb-bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070d"/>
      <stop offset="1" stop-color="#04060a"/>
    </linearGradient>
    <linearGradient id="bb-frame" x1="120" y1="40" x2="1080" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#caa074"/>
      <stop offset="0.5" stop-color="#7a4a26"/>
      <stop offset="1" stop-color="#2f1a0e"/>
    </linearGradient>
    <linearGradient id="bb-frame-inner" x1="160" y1="80" x2="1040" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5a3820"/>
      <stop offset="1" stop-color="#1a0f08"/>
    </linearGradient>
    <linearGradient id="bb-board" x1="180" y1="92" x2="1020" y2="328" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f3a32"/>
      <stop offset="0.5" stop-color="#0a2422"/>
      <stop offset="1" stop-color="#06141a"/>
    </linearGradient>
    <radialGradient id="bb-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(380 200) rotate(8) scale(540 180)">
      <stop stop-color="#7df0cf" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7df0cf" stop-opacity="0"/>
    </radialGradient>
    <filter id="bb-shadow" x="80" y="20" width="1040" height="400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="44" fill="url(#bb-bg)"/>

  <g filter="url(#bb-shadow)">
    <rect x="132" y="48" width="936" height="324" rx="28" fill="url(#bb-frame)"/>
    <rect x="152" y="68" width="896" height="284" rx="22" fill="url(#bb-frame-inner)"/>
    <rect x="176" y="92" width="848" height="236" rx="16" fill="url(#bb-board)"/>
    <rect x="176" y="92" width="848" height="236" rx="16" fill="url(#bb-glow)"/>

    <path d="M212 312H320" stroke="#f4eedb" stroke-opacity="0.85" stroke-width="8" stroke-linecap="round"/>
    <path d="M226 300H290" stroke="#8ef0cf" stroke-opacity="0.7" stroke-width="5" stroke-linecap="round"/>

    <text x="216" y="178" fill="#f5f0e3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="3">BLACKBOARD</text>
    <text x="218" y="212" fill="#9bedd0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">LOCAL-FIRST AGENTIC WORKSPACE</text>
    <text x="218" y="242" fill="#d7f7ec" fill-opacity="0.78" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="0.6">research cockpit · coding control surface · operator chalkboard</text>

    <g transform="translate(830 122)">
      <rect x="0" y="0" width="174" height="34" rx="17" fill="#0b1a18" stroke="#41f0a5" stroke-opacity="0.45"/>
      <circle cx="18" cy="17" r="6" fill="#41f0a5"/>
      <text x="34" y="22" fill="#dffcf2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">LIVE · LOCAL</text>
    </g>

    <g font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="14">
      <text x="830" y="190" fill="#f4eee0" fill-opacity="0.92">&gt; planner · coder · reviewer</text>
      <text x="830" y="214" fill="#8ef0cf" fill-opacity="0.92">&gt; memory · tools · previews</text>
      <text x="830" y="238" fill="#ffd67e" fill-opacity="0.92">&gt; research · runtime · history</text>
    </g>

    <g transform="translate(830 262)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.4">
      <rect x="0" y="0" width="56" height="20" rx="10" fill="#11231f" stroke="#41f0a5" stroke-opacity="0.35"/>
      <text x="10" y="14" fill="#9bedd0">PLAN</text>
      <rect x="64" y="0" width="56" height="20" rx="10" fill="#1a1f12" stroke="#ffd67e" stroke-opacity="0.35"/>
      <text x="74" y="14" fill="#ffd67e">CODE</text>
      <rect x="128" y="0" width="56" height="20" rx="10" fill="#1a1213" stroke="#ff7e8a" stroke-opacity="0.35"/>
      <text x="138" y="14" fill="#ffb1ba">VERIFY</text>
    </g>
  </g>
</svg>
